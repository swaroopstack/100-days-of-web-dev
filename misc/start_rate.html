<!DOCTYPE html>
<html>
<head>
<title>Star Rating</title>
<style>
  .star {
    font-size: 40px;
    cursor: pointer;
    color: lightgray;
  }
  .active {
    color: gold;
  }
</style>

</head>
<body>
<div id="rating">
  <span class="star">★</span>
  <span class="star">★</span>
  <span class="star">★</span>
  <span class="star">★</span>
  <span class="star">★</span>
</div>

<script>
const stars = document.querySelectorAll(".star");
stars.forEach((star, index) => {
  star.onclick = () => {
    stars.forEach(s => s.classList.remove("active"));
    for(let i=0; i<=index; i++){
      stars[i].classList.add("active");
    }
  };
});
</script>
</body>
</html>
